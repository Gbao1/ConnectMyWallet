name: Frontend CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install React dependencies
        run: npm ci

      - name: Run React tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

  compose-check:
    name: Compose check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

  docker-build-pr:
    name: Docker build (pull request)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: connectmytask-frontend:pr-${{ github.event.pull_request.number }}
          build-args: |
            REACT_APP_API_BASE_URL=${{ vars.REACT_APP_API_BASE_URL || 'http://localhost:4000' }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.REACT_APP_GOOGLE_CLIENT_ID || '' }}
            REACT_APP_FACEBOOK_APP_ID=${{ secrets.REACT_APP_FACEBOOK_APP_ID || '' }}
            REACT_APP_RECAPTCHA_SITE_KEY=${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY || '' }}
            REACT_APP_RECAPTCHA_VERIFY_ENABLED=${{ vars.REACT_APP_RECAPTCHA_VERIFY_ENABLED || 'true' }}
            REACT_APP_ADMIN_EMAILS=${{ vars.REACT_APP_ADMIN_EMAILS || '' }}

  publish-image:
    name: Publish Docker image
    runs-on: ubuntu-latest
    needs: [test, compose-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/connectmytask-frontend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            REACT_APP_API_BASE_URL=${{ vars.REACT_APP_API_BASE_URL }}
            REACT_APP_GOOGLE_CLIENT_ID=${{ secrets.REACT_APP_GOOGLE_CLIENT_ID }}
            REACT_APP_FACEBOOK_APP_ID=${{ secrets.REACT_APP_FACEBOOK_APP_ID }}
            REACT_APP_RECAPTCHA_SITE_KEY=${{ secrets.REACT_APP_RECAPTCHA_SITE_KEY }}
            REACT_APP_RECAPTCHA_VERIFY_ENABLED=${{ vars.REACT_APP_RECAPTCHA_VERIFY_ENABLED || 'true' }}
            REACT_APP_ADMIN_EMAILS=${{ vars.REACT_APP_ADMIN_EMAILS }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: publish-image
    if: >-
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      vars.DEPLOY_VPS_ENABLED == 'true'

    steps:
      - name: Deploy frontend container
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_STACK_DIR }}
            if [ -f .env ]; then
              set -a
              source .env
              set +a
            fi
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            docker compose pull frontend
            docker compose up -d frontend
