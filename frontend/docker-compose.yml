services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-http://localhost:4000}
        REACT_APP_GOOGLE_CLIENT_ID: ${REACT_APP_GOOGLE_CLIENT_ID:-}
        REACT_APP_FACEBOOK_APP_ID: ${REACT_APP_FACEBOOK_APP_ID:-}
        REACT_APP_RECAPTCHA_SITE_KEY: ${REACT_APP_RECAPTCHA_SITE_KEY:-}
        REACT_APP_RECAPTCHA_VERIFY_ENABLED: ${REACT_APP_RECAPTCHA_VERIFY_ENABLED:-true}
        REACT_APP_ADMIN_EMAILS: ${REACT_APP_ADMIN_EMAILS:-}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
